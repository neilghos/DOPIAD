seed: 42
device: cuda
num_workers: 0
pin_memory: true
data:
  name: SWAT
  data_root: /data/SWAT
  window_size: 128
  stride: 2
  test_stride: 1
  val_split: 0.2
  scaler_mode: standard
  mask_rates:
  - 0.15
  - 0.3
  - 0.5
  - 0.7
  train_batch_size: 128
  eval_batch_size: 64
  input_size: 51
model:
  latent_dim: 64
  steps: 4
  dt: 0.05
  decoder_hidden_dim: 64
  hamiltonian_hidden_dim: 256
  lr: 0.001
  epochs: 100
  patience: 3
experiment:
  sensor_mode: correlated
